spring:
  application:
    name: fellahia

  web:
    client:
      connection-timeout: 180000   # 60 seconds to connect
      read-timeout: 180000
  # ── Database
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:fellahia_db}
    username: ${DB_USER:fellahia}
    password: ${DB_PASSWORD:2010}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  # ── Flyway ──────────────────────────────────────────────────────────────────
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  # ── File Upload ─────────────────────────────────────────────────────────────
  servlet:
    multipart:
      enabled: true
      max-file-size: 20MB
      max-request-size: 60MB

  # ── Mail (OTP) ───────────────────────────────────────────────────────────────
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:noreply@fellahia.ma}
    password: ${MAIL_PASSWORD:}
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true


  ai:
    ollama:
      base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
      chat:
        model: ${OLLAMA_MODEL:llama3.2:3b}
        options:
          temperature: 0.7
          num-predict: 1024
          num-ctx: 4096
      init:
        timeout: 180s
      embedding:
        model: ${OLLAMA_EMBEDDING_MODEL:nomic-embed-text}
        options:
          num-ctx: 4096

# ── App custom properties
app:
  jwt:
    secret: ${JWT_SECRET:ZmVsbGFoaWEtc2VjcmV0LWtleS1mb3ItZGV2LW9ubHktY2hhbmdlLWluLXByb2Q=}
    expiration-ms: 86400000

# ── MinIO
minio:
  endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
  access-key: ${MINIO_ACCESS_KEY:minioadmin}
  secret-key: ${MINIO_SECRET_KEY:minioadmin}
  bucket: ${MINIO_BUCKET:fellahia-files}

# ── Server
server:
  port: ${PORT:8080}
  error:
    include-message: never
    include-stacktrace: never

# ── Logging
logging:
  level:
    ma.fellahia: DEBUG
    org.springframework.security: WARN
    org.hibernate.SQL: WARN
    org.springframework.ai.ollama: INFO
