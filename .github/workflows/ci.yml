name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: fellahia_db
          POSTGRES_USER: fellahia
          POSTGRES_PASSWORD: 2010
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: ./mvnw clean install -DskipTests -Ddependency-check.skip=true
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: fellahia_db
          DB_USER: fellahia
          DB_PASSWORD: 2010
          JWT_SECRET: test-secret-key-for-ci-only
          MINIO_ENDPOINT: http://localhost:9000
          MINIO_ACCESS_KEY: minioadmin
          MINIO_SECRET_KEY: minioadmin
          MINIO_BUCKET: fellahia-files
          OLLAMA_BASE_URL: http://localhost:11434

      - name: Run Tests
        run: ./mvnw test -Ddependency-check.skip=true
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: fellahia_db
          DB_USER: fellahia
          DB_PASSWORD: 2010
          JWT_SECRET: test-secret-key-for-ci-only
          MINIO_ENDPOINT: http://localhost:9000
          MINIO_ACCESS_KEY: minioadmin
          MINIO_SECRET_KEY: minioadmin
          MINIO_BUCKET: fellahia-files
          OLLAMA_BASE_URL: http://localhost:11434

      - name: SonarCloud analysis
        run: ./mvnw sonar:sonar -Ddependency-check.skip=true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: fellahia_db
          DB_USER: fellahia
          DB_PASSWORD: 2010
          JWT_SECRET: test-secret-key-for-ci-only
          MINIO_ENDPOINT: http://localhost:9000
          MINIO_ACCESS_KEY: minioadmin
          MINIO_SECRET_KEY: minioadmin
          MINIO_BUCKET: fellahia-files
          OLLAMA_BASE_URL: http://localhost:11434
