version: '3.9'

services:

  # ── PostgreSQL ────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: fellahia-db
    restart: unless-stopped
    environment:
      POSTGRES_DB:       fellahia
      POSTGRES_USER:     fellahia
      POSTGRES_PASSWORD: secret
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fellahia"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── MinIO (S3-compatible file storage) ────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: fellahia-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER:     minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web console → http://localhost:9001
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  # ── Ollama (local LLM server) ────────────────────────────────────────────
  # Runs the AI model locally — no OpenAI API key needed.
  # Recommended model: aya (Cohere Aya — Arabic/Darija capable)
  #
  # CPU-only (default):
  #   Works out of the box. Slower inference on large models.
  #
  # GPU (NVIDIA) — uncomment the deploy section below:
  #   Requires NVIDIA Container Toolkit installed on the host.
  #
  # First run — pull the model (runs once, then cached in ollama_data):
  #   docker exec -it fellahia-ollama ollama pull aya
  ollama:
    image: ollama/ollama:latest
    container_name: fellahia-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    # ── Uncomment for NVIDIA GPU support ────────────────────────────────────
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ── Spring Boot App ────────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fellahia-app
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      DB_HOST:           db
      DB_PORT:           5432
      DB_NAME:           fellahia
      DB_USER:           fellahia
      DB_PASSWORD:       secret
      MINIO_ENDPOINT:    http://minio:9000
      MINIO_ACCESS_KEY:  minioadmin
      MINIO_SECRET_KEY:  minioadmin
      MINIO_BUCKET:      fellahia-files
      OLLAMA_BASE_URL:   http://ollama:11434
      OLLAMA_MODEL:      aya
      JWT_SECRET:        ${JWT_SECRET}
      MAIL_HOST:         ${MAIL_HOST:-smtp.gmail.com}
      MAIL_PORT:         ${MAIL_PORT:-587}
      MAIL_USERNAME:     ${MAIL_USERNAME:-}
      MAIL_PASSWORD:     ${MAIL_PASSWORD:-}
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_healthy
      ollama:
        condition: service_healthy

volumes:
  pg_data:
  minio_data:
  ollama_data:    # persists pulled models between restarts
